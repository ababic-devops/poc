name: Rollback

env:
  SERVICE_NAME: poc
  AWS_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'ECR image tag to deploy (e.g. v1.2.0 or main-abc1234)'
        required: true
      dev:
        description: 'Rollback DEV'
        type: boolean
        default: false
      qa:
        description: 'Rollback QA'
        type: boolean
        default: false
      uat:
        description: 'Rollback UAT'
        type: boolean
        default: false
      prd:
        description: 'Rollback PRD'
        type: boolean
        default: false

jobs:
  verify:
    name: Verify image exists in ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SHARED_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify image tag
        env:
          REPOSITORY: cert-shared-infra-ecr-${{ env.SERVICE_NAME }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          aws ecr describe-images \
            --repository-name $REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'imageDetails[0].imageTags' \
            --output text || {
            echo "ERROR: image tag '$IMAGE_TAG' not found in ECR"
            exit 1
          }
          echo "Verified: $IMAGE_TAG exists in ECR"

  rollback-dev:
    name: Rollback DEV → ${{ inputs.image-tag }}
    needs: verify
    if: inputs.dev == true
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          CLUSTER: cert-dev-cluster
          TASK_FAMILY: cert-dev-${{ env.SERVICE_NAME }}
          SERVICE: cert-dev-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.dev = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: rollback dev to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)

  rollback-qa:
    name: Rollback QA → ${{ inputs.image-tag }}
    needs: verify
    if: inputs.qa == true
    runs-on: ubuntu-latest
    environment: qa  # manual approval
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_QA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          CLUSTER: cert-qa-cluster
          TASK_FAMILY: cert-qa-${{ env.SERVICE_NAME }}
          SERVICE: cert-qa-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.qa = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: rollback qa to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)

  rollback-uat:
    name: Rollback UAT → ${{ inputs.image-tag }}
    needs: verify
    if: inputs.uat == true
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_UAT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          CLUSTER: cert-uat-cluster
          TASK_FAMILY: cert-uat-${{ env.SERVICE_NAME }}
          SERVICE: cert-uat-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.uat = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: rollback uat to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)

  rollback-prd:
    name: Rollback PRD → ${{ inputs.image-tag }}
    needs: [verify, rollback-uat]  # uat must complete before prd can start
    if: |
      always() &&
      inputs.prd == true &&
      (needs.verify.result == 'success') &&
      (needs.rollback-uat.result == 'success' || needs.rollback-uat.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prd  # manual approval
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PRD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          CLUSTER: cert-prd-cluster
          TASK_FAMILY: cert-prd-${{ env.SERVICE_NAME }}
          SERVICE: cert-prd-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.prd = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: rollback prd to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)
