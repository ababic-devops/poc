version: 0.2

env:
  shell: bash
  variables:
    ENV: "dev"
    DOCKER_BUILD_DIR: "."
    APP_NAME: ""
    IMAGE_REPO_NAME: ""
    AWS_REGION: ""
    AWS_ECR_ACCOUNT_ID: ""
  parameter-store:
    # GitHub PAT with repo scope — required by semantic-release to push git tags and create releases
    GITHUB_TOKEN: "/cert/shared/github/token"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github

  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - COMMIT_SHA=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - ECR_REPO=$AWS_ECR_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - git config user.email "codebuild@certificial.com"
      - git config user.name "CodeBuild"
      - git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPO.git
      - npx semantic-release
      - VERSION=$(git tag --points-at HEAD | grep '^v' | head -1)

  build:
    commands:
      - |
        if [ -z "$VERSION" ]; then
          echo "No releasable commits — skipping docker build."
        else
          IMAGE_TAG=$VERSION-$ENV-$COMMIT_SHA
          echo "Building $IMAGE_TAG"
          docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG $DOCKER_BUILD_DIR
          docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_REPO:$IMAGE_TAG
          docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_REPO:$ENV
        fi

  post_build:
    commands:
      - |
        if [ -z "$VERSION" ]; then
          printf '[{"name":"%s","imageUri":"%s:%s"}]' "$APP_NAME" "$ECR_REPO" "$ENV" > imagedefinitions.json
        else
          IMAGE_TAG=$VERSION-$ENV-$COMMIT_SHA
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:$ENV
          printf '[{"name":"%s","imageUri":"%s:%s"}]' "$APP_NAME" "$ECR_REPO" "$IMAGE_TAG" > imagedefinitions.json
        fi

artifacts:
  files:
    - imagedefinitions.json
