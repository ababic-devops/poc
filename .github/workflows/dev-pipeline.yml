name: Development and Testing Pipeline

env:
  SERVICE_NAME: poc
  AWS_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    # GitHub natively skips this workflow when the commit message contains [skip ci]
    # semantic-release commits include [skip ci] to prevent looping

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SHARED_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/cert-shared-infra-ecr-${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        uses: certificial/github-actions/ecs-deploy@main
        with:
          image-tag: ${{ needs.build.outputs.image-tag }}
          cluster: cert-dev-cluster
          task-family: cert-dev-${{ env.SERVICE_NAME }}
          service: cert-dev-${{ env.SERVICE_NAME }}
          service-name: ${{ env.SERVICE_NAME }}

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        uses: certificial/github-actions/update-deployments@main
        with:
          image-tag: ${{ needs.build.outputs.image-tag }}
          environment: dev

  deploy-qa:
    name: Deploy to QA
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: qa  # manual approval configured in GitHub Environments
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_QA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        uses: certificial/github-actions/ecs-deploy@main
        with:
          image-tag: ${{ needs.build.outputs.image-tag }}
          cluster: cert-qa-cluster
          task-family: cert-qa-${{ env.SERVICE_NAME }}
          service: cert-qa-${{ env.SERVICE_NAME }}
          service-name: ${{ env.SERVICE_NAME }}

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        uses: certificial/github-actions/update-deployments@main
        with:
          image-tag: ${{ needs.build.outputs.image-tag }}
          environment: qa
