name: Release Pipeline

env:
  SERVICE_NAME: poc
  AWS_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      image-sha:
        description: 'Short SHA of the image to release (7 chars, e.g. a1b2c3d). Leave empty to auto-select the latest main-* image from ECR.'
        required: false
        default: ''

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      released: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  retag:
    name: Re-tag ECR Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SHARED_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve source image tag
        id: source
        env:
          REPOSITORY: cert-shared-infra-ecr-${{ env.SERVICE_NAME }}
        run: |
          if [ -n "${{ inputs.image-sha }}" ]; then
            SOURCE_TAG="main-${{ inputs.image-sha }}"
            echo "Using provided SHA: $SOURCE_TAG"
          else
            SOURCE_TAG=$(aws ecr describe-images \
              --repository-name $REPOSITORY \
              --filter tagStatus=TAGGED \
              --query 'sort_by(imageDetails, &imagePushedAt)[*].imageTags' \
              --output json | jq -r 'reverse | .[] | .[] | select(startswith("main-"))' | head -1)

            if [ -z "$SOURCE_TAG" ]; then
              echo "ERROR: No main-* image found in ECR. Run dev-pipeline first."
              exit 1
            fi

            echo "Auto-selected latest image: $SOURCE_TAG"
          fi
          echo "tag=$SOURCE_TAG" >> $GITHUB_OUTPUT

      - name: Re-tag image in ECR
        env:
          REPOSITORY: cert-shared-infra-ecr-${{ env.SERVICE_NAME }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          TARGET_TAG: v${{ needs.release.outputs.version }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name $REPOSITORY \
            --image-ids imageTag=$SOURCE_TAG \
            --accepted-media-types \
              "application/vnd.docker.distribution.manifest.v2+json" \
              "application/vnd.docker.distribution.manifest.list.v2+json" \
              "application/vnd.oci.image.manifest.v1+json" \
              "application/vnd.oci.image.index.v1+json" \
            --query 'images[0].imageManifest' \
            --output text)

          if [ -z "$MANIFEST" ] || [ "$MANIFEST" = "None" ]; then
            echo "ERROR: image tag '$SOURCE_TAG' not found in ECR repository '$REPOSITORY'"
            echo "Ensure dev-pipeline ran successfully for this commit SHA before releasing"
            exit 1
          fi

          aws ecr put-image \
            --repository-name $REPOSITORY \
            --image-tag $TARGET_TAG \
            --image-manifest "$MANIFEST"

          echo "Re-tagged $SOURCE_TAG → $TARGET_TAG"

  deploy-uat:
    name: Deploy to UAT
    needs: [release, retag]
    runs-on: ubuntu-latest
    environment: uat  # no approval — auto deploys after re-tag
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_UAT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          VERSION: v${{ needs.release.outputs.version }}
          CLUSTER: cert-uat-cluster
          TASK_FAMILY: cert-uat-${{ env.SERVICE_NAME }}
          SERVICE: cert-uat-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${VERSION}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          VERSION: v${{ needs.release.outputs.version }}
        run: |
          jq --arg tag "$VERSION" '.uat = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: update uat to $VERSION [skip ci]" && git pull --rebase origin main && git push)

  deploy-prd:
    name: Deploy to PRD
    needs: [release, deploy-uat]
    runs-on: ubuntu-latest
    environment: prd  # manual approval configured in GitHub Environments
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PRD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          VERSION: v${{ needs.release.outputs.version }}
          CLUSTER: cert-prd-cluster
          TASK_FAMILY: cert-prd-${{ env.SERVICE_NAME }}
          SERVICE: cert-prd-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${VERSION}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          VERSION: v${{ needs.release.outputs.version }}
        run: |
          jq --arg tag "$VERSION" '.prd = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: update prd to $VERSION [skip ci]" && git pull --rebase origin main && git push)
