name: Development and Testing Pipeline

env:
  SERVICE_NAME: poc
  AWS_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    # GitHub natively skips this workflow when the commit message contains [skip ci]
    # semantic-release commits include [skip ci] to prevent looping

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SHARED_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/cert-shared-infra-ecr-${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          CLUSTER: cert-dev-cluster
          TASK_FAMILY: cert-dev-${{ env.SERVICE_NAME }}
          SERVICE: cert-dev-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.dev = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: update dev to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)

  deploy-qa:
    name: Deploy to QA
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: qa  # manual approval configured in GitHub Environments
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_QA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          CLUSTER: cert-qa-cluster
          TASK_FAMILY: cert-qa-${{ env.SERVICE_NAME }}
          SERVICE: cert-qa-${{ env.SERVICE_NAME }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cert-shared-infra-ecr-${SERVICE_NAME}:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE_URI" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img')
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_REVISION --force-new-deployment

      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update deployments.json
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          jq --arg tag "$IMAGE_TAG" '.qa = $tag' deployments.json > tmp.json && mv tmp.json deployments.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --staged --quiet || (git commit -m "chore: update qa to $IMAGE_TAG [skip ci]" && git pull --rebase origin main && git push)
